name: Review App

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint / unit tests
        run: |
          npm run lint --if-present
          npm test --if-present

  deploy-preview:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start review app server
        run: |
          nohup npm run dev &
          echo "Server starting"

      - name: Wait for readiness
        run: |
          for i in {1..20}; do
            if curl -sSf http://localhost:4000/; then
              echo 'Health check passed';
              exit 0;
            fi
            sleep 3;
          done
          exit 1

      - name: Add PR comment with preview URL
        run: echo "Review app at local runner is started on GitHub Actions runner" 
